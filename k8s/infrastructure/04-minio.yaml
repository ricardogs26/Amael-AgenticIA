# ── MinIO — almacenamiento de objetos S3-compatible ───────────────────────────
# Uso:
#   - Backup de documentos subidos vía POST /api/ingest (best-effort)
#   - Bucket por usuario: email sanitizado como nombre del bucket
#
# Credenciales:
#   MINIO_ROOT_USER:     desde Secret amael-secrets → MINIO_ACCESS_KEY
#   MINIO_ROOT_PASSWORD: desde Secret amael-secrets → MINIO_ROOT_PASSWORD
#
# Consola web: http://<node-ip>:30090  (NodePort)
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: amael-ia
  labels:
    app: minio
    app.kubernetes.io/part-of: amael-ia
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: amael-ia
  labels:
    app: minio
    app.kubernetes.io/part-of: amael-ia
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: minio/minio:RELEASE.2024-11-07T00-52-20Z
        args:
        - server
        - /data
        - --console-address
        - ":9001"
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: amael-secrets
              key: MINIO_ACCESS_KEY
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: amael-secrets
              key: MINIO_ROOT_PASSWORD
        ports:
        - containerPort: 9000
          name: api
        - containerPort: 9001
          name: console
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        volumeMounts:
        - name: minio-storage
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /minio/health/live
            port: 9000
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /minio/health/ready
            port: 9000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
      volumes:
      - name: minio-storage
        persistentVolumeClaim:
          claimName: minio-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: minio-service
  namespace: amael-ia
  labels:
    app: minio
spec:
  selector:
    app: minio
  ports:
  - name: api
    protocol: TCP
    port: 9000
    targetPort: 9000
  - name: console
    protocol: TCP
    port: 9001
    targetPort: 9001
  type: ClusterIP

---
# Consola MinIO accesible desde fuera del clúster (opcional, para administración)
apiVersion: v1
kind: Service
metadata:
  name: minio-console-nodeport
  namespace: amael-ia
  labels:
    app: minio
spec:
  selector:
    app: minio
  ports:
  - name: console
    protocol: TCP
    port: 9001
    targetPort: 9001
    nodePort: 30090
  type: NodePort
