# piper-service — TTS via Piper TTS (CPU only)
# Modelos baked en la imagen — sin PVC necesario
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: piper-deployment
  namespace: amael-ia
  labels:
    app: piper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: piper
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: piper
        monitor: amael-metrics
    spec:
      containers:
        - name: piper
          image: registry.richardx.dev/piper-service:1.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8010

          env:
            - name: PIPER_MODELS_DIR
              value: "/models"
            - name: PIPER_DEFAULT_VOICE
              value: "es_MX-claude-high"
            - name: TTS_MAX_CHARS
              value: "1000"

          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
            # Sin nvidia.com/gpu — CPU only

          startupProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6    # 30s máximo para arrancar
          livenessProbe:
            httpGet:
              path: /health
              port: 8010
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8010
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: piper-service
  namespace: amael-ia
  labels:
    app: piper
spec:
  selector:
    app: piper
  ports:
    - name: http
      port: 8010
      targetPort: 8010
  type: ClusterIP
