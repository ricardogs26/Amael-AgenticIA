# camael-service — DevOps / GitOps Agent autónomo (extraído del backend)
#
# Fase 3 · feature/agents-split — ver docs/superpowers/specs/2026-04-23-phase-3-camael-standalone-design.md
#
# Este servicio absorbe agents/devops/ del backend amael-agentic-backend
# como pod independiente. Expone:
#   - POST /api/camael/handoff       ← Raphael (handoff GitOps)
#   - PATCH /api/camael/rfc/{sys_id} ← Raphael (update RFC post-verif)
#   - POST /api/devops/ci-hook       ← GitHub webhooks (futuro — queda en backend en Fase 3)
#   - POST /api/devops/webhook/bitbucket ← Bitbucket webhooks (futuro — queda en backend en Fase 3)
#
# Dependencias externas (ya existentes):
#   - ServiceAccount `camael-sa`           (k8s/rbac/06-camael-rbac.yaml, Fase 1)
#   - NetworkPolicies con label app=camael-service (k8s/config/03-agents-network-policies.yaml, Task 10)
#   - Secret `amael-secrets` en amael-ia    (POSTGRES_PASSWORD, INTERNAL_API_SECRET, etc.)
#   - Secret `bitbucket-credentials` en amael-ia (BITBUCKET_*)
#   - Secret `servicenow-credentials` en amael-ia (SERVICENOW_*)  [verificar existe]

apiVersion: v1
kind: ConfigMap
metadata:
  name: camael-service-config
  namespace: amael-ia
  labels:
    app: camael-service
    tier: agents
data:
  OLLAMA_BASE_URL:  "http://ollama-service:11434"
  LLM_PROVIDER:     "ollama"
  LLM_MODEL:        "qwen3:14b"
  LLM_EMBED_MODEL:  "nomic-embed-text"

  POSTGRES_HOST:     "postgres-service"
  POSTGRES_PORT:     "5432"
  POSTGRES_DB:       "amael_db"
  POSTGRES_USER:     "amael_user"
  POSTGRES_POOL_MIN: "2"
  POSTGRES_POOL_MAX: "10"

  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB:   "0"

  QDRANT_URL: "http://qdrant-service:6333"

  VAULT_ADDR: "http://vault.vault.svc.cluster.local:8200"
  VAULT_ROLE: "camael-service"

  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability.svc.cluster.local:4317"
  OTEL_SERVICE_NAME:           "camael-service"

  # camael-service siempre corre Camael in-process; el flag sólo afecta a sus
  # CLIENTES externos (backend, raphael) que lo consumen via HTTP.
  CAMAEL_MODE:  "inprocess"
  AGENTS_MODE:  "inprocess"

  ENVIRONMENT: "production"
  LOG_LEVEL:   "INFO"

  # Bitbucket workspace/repo son públicos (no secretos).
  BITBUCKET_WORKSPACE: "amael_agenticia"
  BITBUCKET_REPO:      "amael-agentic-backend"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: camael-service
  namespace: amael-ia
  labels:
    app: camael-service
    tier: agents
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: camael-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: camael-service
        tier: agents
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8003"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: camael-sa
      securityContext:
        fsGroup: 1000
      terminationGracePeriodSeconds: 30

      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh","-c","until nc -z postgres-service 5432; do echo waiting pg; sleep 3; done"]
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh","-c","until nc -z redis-service 6379; do echo waiting redis; sleep 3; done"]

      containers:
        - name: camael
          image: registry.richardx.dev/camael-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8003

          envFrom:
            - configMapRef:
                name: camael-service-config

          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: amael-secrets
                  key: POSTGRES_PASSWORD
            - name: INTERNAL_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: google-auth-secret
                  key: internal_api_secret
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: google-auth-secret
                  key: jwt_secret_key
            - name: SESSION_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: google-auth-secret
                  key: session_secret_key

            - name: BITBUCKET_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bitbucket-credentials
                  key: username
            - name: BITBUCKET_TOKEN
              valueFrom:
                secretKeyRef:
                  name: bitbucket-credentials
                  key: token

            - name: SERVICENOW_USERNAME
              valueFrom:
                secretKeyRef:
                  name: servicenow-credentials
                  key: username
                  optional: true
            - name: SERVICENOW_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: servicenow-credentials
                  key: password
                  optional: true
            - name: SERVICENOW_INSTANCE
              valueFrom:
                secretKeyRef:
                  name: servicenow-credentials
                  key: instance
                  optional: true

            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          resources:
            requests:
              cpu:    "100m"
              memory: "256Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds:       30
            timeoutSeconds:      5
            failureThreshold:    3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds:       10
            timeoutSeconds:      3
            failureThreshold:    2

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

---
apiVersion: v1
kind: Service
metadata:
  name: camael-service
  namespace: amael-ia
  labels:
    app: camael-service
    tier: agents
    monitor: amael-metrics
spec:
  type: ClusterIP
  selector:
    app: camael-service
  ports:
    - name:       http
      protocol:   TCP
      port:       8003
      targetPort: http

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: camael-service-pdb
  namespace: amael-ia
  labels:
    app: camael-service
    tier: agents
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: camael-service
