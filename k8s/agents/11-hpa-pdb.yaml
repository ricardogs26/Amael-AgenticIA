---
# HorizontalPodAutoscaler — amael-agentic-backend
# Escala entre 1 y 3 réplicas basándose en CPU.
# minReplicas=1 porque el cluster es single-node con 1 GPU (Ollama lo ocupa).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: amael-agentic-hpa
  namespace: amael-ia
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: amael-agentic-deployment
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # 5 min — evita flapping
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30
---
# PodDisruptionBudget — garantiza al menos 1 pod disponible durante
# actualizaciones de nodo o drain del cluster.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: amael-agentic-pdb
  namespace: amael-ia
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: amael-agentic-backend
