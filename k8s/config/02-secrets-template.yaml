# =========================================================================
# ⚠️  PLANTILLA DE SECRETOS — NO COMMITEAR CON VALORES REALES
#
# INSTRUCCIONES:
#   1. Copia este archivo: cp 02-secrets-template.yaml 02-secrets.yaml
#   2. El archivo 02-secrets.yaml está en .gitignore — es seguro editarlo
#   3. Rellena los valores (no necesitan base64 con stringData)
#   4. Aplica: kubectl apply -f k8s/config/02-secrets.yaml
#
# NOTA: Los secretos google-auth-secret y amael-secrets ya existen en el
# clúster (creados para backend-ia). Este archivo los reutiliza — sólo
# aplica si necesitas actualizarlos o crearlos en un cluster nuevo.
# =========================================================================

# ── Secretos compartidos (ya existen en el clúster) ──────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: google-auth-secret
  namespace: amael-ia
type: Opaque
stringData:
  client_id:           "TU_GOOGLE_CLIENT_ID_AQUI"
  client_secret:       "TU_GOOGLE_CLIENT_SECRET_AQUI"
  jwt_secret_key:      "TU_JWT_SECRET_KEY_AQUI"         # openssl rand -hex 32
  session_secret_key:  "TU_SESSION_SECRET_KEY_AQUI"     # openssl rand -hex 32
  internal_api_secret: "TU_INTERNAL_API_SECRET_AQUI"    # openssl rand -hex 32

---
apiVersion: v1
kind: Secret
metadata:
  name: amael-secrets
  namespace: amael-ia
type: Opaque
stringData:
  jwt-token:           "TU_JWT_BOT_TOKEN_AQUI"
  POSTGRES_PASSWORD:   "TU_POSTGRES_PASSWORD_AQUI"
  MINIO_ACCESS_KEY:    "TU_MINIO_ACCESS_KEY_AQUI"
  MINIO_ROOT_PASSWORD: "TU_MINIO_ROOT_PASSWORD_AQUI"

---
# ── Secretos exclusivos del nuevo backend ────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: amael-agentic-secrets
  namespace: amael-ia
type: Opaque
stringData:
  # GitHub Personal Access Token (para GitHubTool)
  # Scope mínimo: repo:read, workflow:read
  GITHUB_TOKEN: "TU_GITHUB_TOKEN_AQUI"

  # Grafana admin credentials (para GrafanaTool)
  GRAFANA_USER:     "admin"
  GRAFANA_PASSWORD: "TU_GRAFANA_PASSWORD_AQUI"
