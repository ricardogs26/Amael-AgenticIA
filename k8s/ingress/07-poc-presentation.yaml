apiVersion: apps/v1
kind: Deployment
metadata:
  name: poc-presentation
  namespace: amael-ia
  labels:
    app: poc-presentation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poc-presentation
  template:
    metadata:
      labels:
        app: poc-presentation
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "200m"
            memory: "64Mi"
      volumes:
      - name: html
        configMap:
          name: poc-presentation-html
---
apiVersion: v1
kind: Service
metadata:
  name: poc-presentation-service
  namespace: amael-ia
spec:
  selector:
    app: poc-presentation
  ports:
  - port: 80
    targetPort: 80
