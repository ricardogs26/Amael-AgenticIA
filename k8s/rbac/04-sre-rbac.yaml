# RBAC para amael-agentic-backend
#
# El nuevo backend incorpora el SRE loop autónomo (agents/sre/) por lo que
# necesita los mismos permisos que el k8s-agent actual:
#   - ClusterRole sre-agent-observer (ya existe — creado por k8s-agent)
#   - Role sre-agent-healer en amael-ia (ya existe — creado por k8s-agent)
#
# Sólo se crean los Bindings para el nuevo SA.
# Si se despliega en un clúster limpio, descomentar los ClusterRole/Role.

# ── ClusterRole: ArgoCD Application reader ────────────────────────────────────
# Permite a amael-agentic-sa leer ArgoCD Applications para el discovery dinámico
# de manifests (argocd_discovery.py — reemplaza APP_MANIFEST_MAP estático).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-application-reader
rules:
- apiGroups: ["argoproj.io"]
  resources: ["applications"]
  verbs: ["get", "list", "watch"]

---
# ── ClusterRoleBinding: ArgoCD Application reader ────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: amael-agentic-argocd-reader-binding
subjects:
- kind: ServiceAccount
  name: amael-agentic-sa
  namespace: amael-ia
roleRef:
  kind: ClusterRole
  name: argocd-application-reader
  apiGroup: rbac.authorization.k8s.io

---
# ── ClusterRoleBinding: observer (lectura global) ─────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: amael-agentic-observer-binding
subjects:
- kind: ServiceAccount
  name: amael-agentic-sa
  namespace: amael-ia
roleRef:
  kind: ClusterRole
  name: sre-agent-observer      # ClusterRole creado por k8s-agent
  apiGroup: rbac.authorization.k8s.io

---
# ── RoleBinding: healer (escritura en amael-ia) ───────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: amael-agentic-healer-binding
  namespace: amael-ia
subjects:
- kind: ServiceAccount
  name: amael-agentic-sa
  namespace: amael-ia
roleRef:
  kind: Role
  name: sre-agent-healer         # Role creado por k8s-agent
  apiGroup: rbac.authorization.k8s.io

