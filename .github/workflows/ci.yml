name: CI — amael-agentic-backend

on:
  push:
    branches: [main, develop]
    paths:
      - "**/*.py"
      - "requirements*.txt"
      - "pyproject.toml"
      - "Dockerfile"
      - "k8s/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
  # Permite disparar el job de tests manualmente (QAAgent vía chat o GitHub UI)
  workflow_dispatch:
    inputs:
      ref:
        description: "Rama o commit a testear"
        required: false
        default: "develop"
      reason:
        description: "Motivo de la ejecución manual"
        required: false
        default: "on-demand"

env:
  REGISTRY: registry.richardx.dev
  IMAGE:    amael-agentic-backend

jobs:
  # ── 0-A. Secret scanning (todos los branches y PRs) ──────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # historial completo para detectar secrets en commits anteriores
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 0-B. Dependency vulnerability scan (todos los branches y PRs) ────────────
  dep-scan:
    name: Dependency Scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar pip-audit
        run: pip install pip-audit --quiet

      - name: Instalar dependencias del proyecto
        run: pip install -e ".[all]" --quiet

      - name: Scan de vulnerabilidades en dependencias
        run: pip-audit --format=markdown --output=dep-scan-report.md || (cat dep-scan-report.md >> $GITHUB_STEP_SUMMARY && exit 1)

      - name: Publicar reporte en summary
        if: always()
        run: cat dep-scan-report.md >> $GITHUB_STEP_SUMMARY || true

  # ── 0-C. IaC scan — Checkov sobre manifests K8s (todos los branches y PRs) ────
  iac-scan:
    name: IaC Scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: IaC scan K8s manifests
        uses: bridgecrewio/checkov-action@v12
        with:
          config_file: .checkov.yaml
          soft_fail: true          # visible en summary, no bloquea CI aún
          output_format: cli
          output_file_path: checkov-report.txt

      - name: Publicar reporte en summary
        if: always()
        run: |
          echo "## Checkov IaC Scan" >> $GITHUB_STEP_SUMMARY
          tail -20 checkov-report.txt >> $GITHUB_STEP_SUMMARY || true

  # ── 0-E. SAST — análisis estático de código Python (todos los branches y PRs) ─
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar bandit
        run: pip install bandit --quiet

      - name: SAST scan
        run: |
          bandit -r agents/ interfaces/ core/ security/ \
            --severity-level medium --confidence-level medium \
            -f txt -o bandit-report.txt || (cat bandit-report.txt >> $GITHUB_STEP_SUMMARY && exit 1)

      - name: Publicar reporte en summary
        if: always()
        run: cat bandit-report.txt >> $GITHUB_STEP_SUMMARY || true

  # ── 1. Test (en push a develop/main y en PRs a main) ─────────────────────────
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    needs: [secret-scan, dep-scan, iac-scan, sast]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install -e ".[dev]" --quiet

      - name: Lint (ruff)
        run: ruff check . --output-format=github

      - name: Tests
        run: pytest tests/ -m "not e2e" --tb=short -q
        env:
          # Variables mínimas para que los tests no fallen por imports
          POSTGRES_HOST:       localhost
          REDIS_HOST:          localhost
          QDRANT_URL:          http://localhost:6333
          OLLAMA_BASE_URL:     http://localhost:11434
          JWT_SECRET_KEY:      ci-test-secret
          INTERNAL_API_SECRET: ci-internal-secret

  # ── 2. Build & Push (solo en merge/push a main) ───────────────────────────────
  # Corre en self-hosted para que el push llegue directo a registry.richardx.dev
  # (192.168.0.200) sin pasar por Cloudflare y evitar el timeout HTTP 524.
  build:
    name: Build & Push image
    runs-on: [self-hosted, amael-lab]
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extraer versión del manifest K8s
        id: version
        run: |
          VERSION=$(grep 'image:.*amael-agentic-backend' k8s/agents/05-backend-deployment.yaml \
            | head -1 | sed 's/.*://' | tr -d ' ')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Versión detectada: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker   # usa el daemon local, no un builder efímero

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
          cache-to: type=inline

      - name: Container scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.version.outputs.version }}
          format: table
          output: trivy-report.txt
          severity: CRITICAL,HIGH
          exit-code: 0          # soft-fail: visible pero no bloquea deploy
        continue-on-error: true

      - name: Publicar reporte Trivy en summary
        if: always()
        run: |
          echo "## Trivy Container Scan" >> $GITHUB_STEP_SUMMARY
          cat trivy-report.txt >> $GITHUB_STEP_SUMMARY || echo "Sin reporte" >> $GITHUB_STEP_SUMMARY

      - name: Generar SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.version.outputs.version }}
          artifact-name: sbom-${{ steps.version.outputs.version }}.spdx.json
          output-file: sbom-${{ steps.version.outputs.version }}.spdx.json
        continue-on-error: true

  # ── 3. Deploy + notificar a Raphael (solo en merge/push a main) ───────────────
  deploy:
    name: Deploy a K8s (MicroK8s)
    runs-on: [self-hosted, amael-lab]
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Apply manifest K8s
        run: |
          kubectl apply -f k8s/agents/05-backend-deployment.yaml -n amael-ia

      - name: Esperar rollout
        run: |
          kubectl rollout status deployment/amael-agentic-deployment -n amael-ia --timeout=300s

      - name: Verificar pod corriendo
        run: |
          kubectl get pods -n amael-ia -l app=amael-agentic --no-headers
          echo "Versión desplegada: ${{ needs.build.outputs.version }}"

      - name: Notificar a Raphael (monitoreo intensificado 10min)
        run: |
          curl -s -X POST \
            http://k8s-agent-service.amael-ia.svc.cluster.local:8002/api/sre/deploy-hook \
            -H "Authorization: Bearer ${{ secrets.AMAEL_INTERNAL_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"service\": \"amael-agentic-backend\",
              \"version\": \"${{ needs.build.outputs.version }}\",
              \"commit\":  \"${{ github.sha }}\",
              \"author\":  \"${{ github.actor }}\",
              \"message\": \"${{ github.event.head_commit.message }}\"
            }" || echo "Raphael no disponible — hook omitido"
